apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-app
  template:
    metadata:
      labels:
        app: devsecops-app
    spec:
      containers:
      - name: app
        image: 725740881393.dkr.ecr.eu-north-1.amazonaws.com/devsecops-app:latest
        ports:
        - containerPort: 3000
